<!DOCTYPE html>
<!--
  Fragmento da tabela de produtos florais.

  Fragmentos Thymeleaf:
  - th:fragment="tabela" marca este elemento como um fragmento reutilizável.
  - Para incluir em outra página: th:insert="~{produtos-florais/fragments/tabela :: tabela}"
  - Para retornar do controller: return "produtos-florais/fragments/tabela :: tabela"

  Este fragmento é retornado pelo controller quando:
  1. O usuário digita no campo de busca (HTMX faz GET /produtos-florais/fragmento-tabela)
  2. A página é carregada pela primeira vez (incluído via th:insert na lista.html)
-->
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="tabela">

    <!-- Tabela responsiva Bootstrap -->
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th scope="col" style="width: 5%">#</th>
                    <th scope="col" style="width: 24%">Nome</th>
                    <th scope="col" style="width: 16%">Categoria</th>
                    <th scope="col" style="width: 14%">Cor</th>
                    <th scope="col" style="width: 14%" class="text-center">Estoque</th>
                    <th scope="col" style="width: 12%" class="text-end">Preço</th>
                    <th scope="col" style="width: 15%" class="text-center">Ações</th>
                </tr>
            </thead>
            <!--
              tbody com id="lista-produtos-florais" — usado pelo HTMX como alvo para inserção de novas linhas.
              Quando um produto é criado via POST /produtos-florais:
                hx-target="#lista-produtos-florais" hx-swap="beforeend"
              O HTMX adiciona a nova linha ao final do tbody.
            -->
            <tbody id="lista-produtos-florais">

                <!--
                  th:each itera sobre a lista de produtos da página atual.
                  ${produtosFlorais.content} retorna os itens da página atual (Page<Produto Floral> do Spring Data).
                  Inclui o fragmento "linha" para cada produto — mantém o HTML DRY (Don't Repeat Yourself).
                -->
                <th:block th:each="produtoFloral : ${produtosFlorais.content}"
                          th:insert="~{produtos-florais/fragments/linha :: linha(produtoFloral=${produtoFloral})}">
                </th:block>

                <!-- Mensagem quando não há produtos -->
                <tr th:if="${produtosFlorais == null or produtosFlorais.content.empty}">
                    <td colspan="7" class="text-center text-muted py-5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"
                             fill="currentColor" class="bi bi-inbox d-block mx-auto mb-2 text-secondary"
                             viewBox="0 0 16 16">
                            <path d="M4.98 4a.5.5 0 0 0-.39.188L1.54 8H6a.5.5 0 0 1 .5.5 1.5 1.5 0 1 0 3 0A.5.5 0 0 1 10 8h4.46l-3.05-3.812A.5.5 0 0 0 11.02 4zm-1.17-.437A1.5 1.5 0 0 1 4.98 3h6.04a1.5 1.5 0 0 1 1.17.563l3.7 4.625a.5.5 0 0 1 .106.374l-.39 3.124A1.5 1.5 0 0 1 14.117 13H1.883a1.5 1.5 0 0 1-1.489-1.314l-.39-3.124a.5.5 0 0 1 .106-.374z"/>
                        </svg>
                        Nenhum item encontrado.
                    </td>
                </tr>

            </tbody>
        </table>
    </div>

    <!-- Paginação -->
    <nav th:if="${produtosFlorais != null and produtosFlorais.totalPages > 1}"
         aria-label="Paginação de produtos" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center mb-0">

            <!-- Botão "Anterior" -->
            <li class="page-item" th:classappend="${produtosFlorais.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/produtos-florais(pagina=${paginaAtual - 1}, busca=${busca})}"
                   aria-label="Anterior">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>

            <!-- Números de página -->
            <li th:each="i : ${#numbers.sequence(0, produtosFlorais.totalPages - 1)}"
                class="page-item"
                th:classappend="${i == paginaAtual} ? 'active'">
                <a class="page-link"
                   th:href="@{/produtos-florais(pagina=${i}, busca=${busca})}"
                   th:text="${i + 1}">1</a>
            </li>

            <!-- Botão "Próximo" -->
            <li class="page-item" th:classappend="${produtosFlorais.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/produtos-florais(pagina=${paginaAtual + 1}, busca=${busca})}"
                   aria-label="Próximo">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>

        </ul>
        <p class="text-center text-muted small mt-1">
            Página <span th:text="${paginaAtual + 1}">1</span>
            de <span th:text="${produtosFlorais.totalPages}">1</span>
            — <span th:text="${produtosFlorais.totalElements}">0</span> item(ns) no total
        </p>
    </nav>

</th:block>

</body>
</html>
