<!DOCTYPE html>
<!--
  Fragmento de uma linha da tabela de produtos.

  Este fragmento representa um <tr> único na tabela.
  É utilizado em dois contextos:
  1. Renderização inicial: incluído pelo tabela.html via th:each para cada produto.
  2. Respostas HTMX: retornado pelo controller após criar (POST) ou atualizar (PUT) um produto,
     para que o HTMX insira ou substitua a linha na tabela sem recarregar a página.

  O id="produto-{id}" no <tr> é fundamental para o HTMX:
  - Na criação: hx-swap="beforeend" no tbody adiciona esta linha ao final.
  - Na atualização: hx-target="#produto-{id}" hx-swap="outerHTML" substitui a linha existente.
  - Na exclusão: hx-target="#produto-{id}" hx-swap="outerHTML" + body vazio remove a linha.
-->
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  th:fragment="linha(produto)" define o fragmento com parâmetro.
  Quando chamado via th:insert, o produto é passado explicitamente:
    th:insert="~{produtos/fragments/linha :: linha(produto=${produto})}"
  Quando retornado pelo controller, o produto já está no Model como "produto".
-->
<tr th:fragment="linha"
    th:id="'produto-' + ${produto.id}">

    <!-- ID do produto -->
    <td class="text-muted small" th:text="${produto.id}">#1</td>

    <!-- Nome do produto -->
    <td>
        <span class="fw-semibold" th:text="${produto.nome}">Nome do Produto</span>
        <div th:if="${produto.descricao != null and !produto.descricao.isEmpty()}"
             th:text="${#strings.abbreviate(produto.descricao, 60)}"
             th:title="${produto.descricao}"
             class="text-muted small">
            Descrição do item...
        </div>
    </td>

    <!-- Categoria -->
    <td>
        <span class="badge bg-light text-dark border"
              th:text="${produto.categoria.descricao}">
            Flor de corte
        </span>
    </td>

    <!-- Cor predominante -->
    <td>
        <span th:if="${produto.cor != null and !produto.cor.isEmpty()}"
              th:text="${produto.cor}">
            Vermelha
        </span>
        <span th:unless="${produto.cor != null and !produto.cor.isEmpty()}"
              class="text-muted fst-italic small">
            Sem cor
        </span>
    </td>

    <!-- Estoque -->
    <td class="text-center">
        <span class="badge"
              th:classappend="${produto.disponivel} ? 'bg-success' : 'bg-secondary'">
            <span th:text="${produto.quantidadeEstoque}">0</span>
            <span th:text="${produto.disponivel} ? 'disponível' : 'sem estoque'">disponível</span>
        </span>
    </td>

    <!-- Preço formatado como moeda brasileira -->
    <td class="text-end">
        <span class="badge bg-success fs-6">
            <!--
              #numbers.formatDecimal: utilitário Thymeleaf para formatação numérica.
              Parâmetros: valor, mínimo de dígitos inteiros, separador de milhar, casas decimais, separador decimal.
              Resultado: R$ 1.234,56
            -->
            R$ <span th:text="${#numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')}">0,00</span>
        </span>
    </td>

    <!-- Botões de ação -->
    <td class="text-center">
        <div class="btn-group btn-group-sm" role="group" aria-label="Ações">

            <!--
              Botão Editar — HTMX carrega o formulário preenchido no modal.

              hx-get="/produtos/{id}/editar"  → busca o fragmento do formulário com os dados do produto
              hx-target="#modal-container"    → insere no container do modal (definido no layout)
              hx-swap="innerHTML"             → substitui o conteúdo do container
            -->
            <button type="button"
                    class="btn btn-outline-primary"
                    th:attr="hx-get='/produtos/' + ${produto.id} + '/editar'"
                    hx-target="#modal-container"
                    hx-swap="innerHTML"
                    title="Editar item">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"
                     class="bi bi-pencil" viewBox="0 0 16 16">
                    <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/>
                </svg>
            </button>

            <!--
              Botão Excluir — HTMX envia DELETE e remove a linha da tabela.

              hx-delete="/produtos/{id}"      → envia requisição DELETE para o endpoint
              hx-target="#produto-{id}"       → alvo é a própria linha (this tr)
              hx-swap="outerHTML"             → substitui o elemento inteiro (com body vazio = remove)
              hx-confirm                      → exibe diálogo de confirmação nativo do browser
            -->
            <button type="button"
                    class="btn btn-outline-danger"
                    th:attr="hx-delete='/produtos/' + ${produto.id},
                             hx-target='#produto-' + ${produto.id},
                             hx-confirm='Confirma a exclusão do item &quot;' + ${produto.nome} + '&quot;?'"
                    hx-swap="outerHTML"
                    title="Excluir item">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"
                     class="bi bi-trash" viewBox="0 0 16 16">
                    <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                    <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                </svg>
            </button>

        </div>
    </td>

</tr>

</body>
</html>
