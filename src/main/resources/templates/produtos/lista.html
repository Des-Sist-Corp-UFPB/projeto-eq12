<!DOCTYPE html>
<!--
  Página principal de listagem de produtos.

  Herança de layout com Thymeleaf — padrão correto:
  - th:replace="~{layout :: layout(~{::main})}" deve estar no elemento <html>,
    NÃO em um elemento <main> ou <div> interno.
  - Motivo: se th:replace estiver em um <main> e o seletor for ~{::main},
    o Thymeleaf captura TODOS os elementos <main> do template — incluindo o
    que tem th:replace — causando recursão infinita de layouts.
  - Com th:replace no <html>: o seletor ~{::main} captura apenas o único <main>
    do template, sem recursão.

  Padrão HTMX usado nesta página:
  - Campo de busca: atualiza apenas a tabela sem recarregar a página inteira
  - Botão Novo Produto: carrega o formulário modal via AJAX
  - A tabela é um fragmento separado para poder ser atualizada independentemente
-->
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::main})}">
<head>
    <title>Catálogo da Floricultura</title>
</head>
<body>

<main>
    <!-- Cabeçalho da página -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Catálogo da Floricultura</h1>
            <p class="text-muted mb-0">Gerencie flores, arranjos, plantas e presentes</p>
        </div>
        <!--
          Botão que aciona o HTMX para carregar o formulário de novo produto.

          hx-get="/produtos/novo"       → faz GET para o endpoint que retorna o fragmento do formulário
          hx-target="#modal-container"  → insere a resposta no div #modal-container (definido no layout)
          hx-swap="innerHTML"           → substitui o conteúdo interno do target
          hx-indicator="#spinner"       → exibe o spinner enquanto a requisição está em andamento
        -->
        <button class="btn btn-primary"
                hx-get="/produtos/novo"
                hx-target="#modal-container"
                hx-swap="innerHTML"
                hx-indicator="#spinner">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                 class="bi bi-plus-lg me-1" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/>
            </svg>
            Novo Item
            <!-- Spinner visível durante requisições HTMX (htmx-indicator) -->
            <span id="spinner" class="spinner-border spinner-border-sm htmx-indicator ms-1"
                  role="status" aria-hidden="true"></span>
        </button>
    </div>

    <!-- Card que envolve a tabela -->
    <div class="card shadow-sm">
        <div class="card-body">

            <!-- Campo de busca com debounce via HTMX -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <!--
                      Campo de busca com HTMX:

                      hx-get="/produtos/fragmento-tabela"       → URL que retorna o fragmento da tabela
                      hx-trigger="keyup changed delay:400ms"    → dispara após 400ms sem digitar
                                                                   (debounce — evita requisição a cada tecla)
                      hx-target="#tabela-container"             → substitui apenas o container da tabela
                      hx-swap="innerHTML"                       → substitui o conteúdo interno
                      name="busca"                              → o valor do campo é enviado como query param
                    -->
                    <div class="input-group">
                        <span class="input-group-text">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                 fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                            </svg>
                        </span>
                        <input type="search"
                               name="busca"
                               class="form-control"
                               placeholder="Buscar por nome ou cor..."
                               th:value="${busca}"
                               hx-get="/produtos/fragmento-tabela"
                               hx-trigger="keyup changed delay:400ms, search"
                               hx-target="#tabela-container"
                               hx-swap="innerHTML"/>
                    </div>
                </div>
                <div class="col-md-6 text-end">
                    <!-- Total de resultados exibido após busca -->
                    <span class="text-muted small" th:if="${produtos != null}">
                        <span th:text="${produtos.totalElements}">0</span> item(ns) encontrado(s)
                    </span>
                </div>
            </div>

            <!--
              Container da tabela — o HTMX substitui o conteúdo deste div
              quando o usuário busca ou quando a tabela precisa ser atualizada.
              O fragmento retornado pelo servidor é inserido aqui.
            -->
            <div id="tabela-container">
                <!--
                  Inclui o fragmento da tabela.
                  th:insert inclui o fragmento dentro deste elemento (mantendo o div).
                  Alternativa: th:replace substituiria o próprio div pelo fragmento.
                -->
                <th:block th:insert="~{produtos/fragments/tabela :: tabela}"></th:block>
            </div>

        </div>
    </div>

</main>

</body>
</html>
